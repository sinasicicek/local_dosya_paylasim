<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Dosya Yöneticisi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius);
            border: 1px solid hsl(var(--input));
            background: hsl(var(--background));
            font-family: inherit;
        }
        .form-input:focus {
            outline: 2px solid hsl(var(--ring));
            outline-offset: 2px;
        }
        .error-message {
            color: hsl(var(--destructive));
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="card-header">
                <h1 class="card-title">Giriş Yap</h1>
            </div>
            <div class="card-content">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">E-posta</label>
                        <input type="email" id="email" class="form-input" required placeholder="ornek@mail.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Şifre</label>
                        <input type="password" id="password" class="form-input" required placeholder="••••••••">
                    </div>
                    <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        Giriş Yap
                    </button>
                    <div id="errorMessage" class="error-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { login, checkAuth } from './auth.js';

        // Eğer zaten giriş yapılmışsa ana sayfaya yönlendir
        checkAuth(false).then(user => {
            if (user) window.location.href = 'index.html';
        });

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Giriş yapılıyor...';
            errorMessage.style.display = 'none';

            const result = await login(email, password);

            if (result.success) {
                window.location.href = 'index.html';
            } else {
                errorMessage.textContent = 'Hatalı e-posta veya şifre: ' + result.error;
                errorMessage.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Giriş Yap';
            }
        });
    </script>
</body>
</html>
